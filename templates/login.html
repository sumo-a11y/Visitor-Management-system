<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — VMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3a5f 0%, #2196F3 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif; padding: 1rem;
    }
    .login-card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%; max-width: 420px; overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #1e3a5f, #2196F3);
      color: #fff; padding: 2rem; text-align: center;
    }
    .login-header .icon {
      width: 64px; height: 64px; background: rgba(255,255,255,0.2);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 1.8rem; margin: 0 auto 1rem;
    }
    .login-body { padding: 2rem; }
    .form-label { font-weight: 600; font-size: 0.88rem; color: #374151; }
    .form-control {
      border-radius: 10px; padding: 0.65rem 1rem;
      border-color: #d1d5db;
    }
    .form-control:focus { border-color: #2196F3; box-shadow: 0 0 0 3px rgba(33,150,243,0.15); }
    .btn-login {
      background: linear-gradient(135deg, #1e3a5f, #2196F3);
      color: #fff; border: none; border-radius: 10px;
      padding: 0.75rem; font-size: 1rem; font-weight: 600; width: 100%;
    }
    .btn-login:hover { opacity: 0.9; color: #fff; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="icon"><i class="bi bi-shield-lock"></i></div>
    <h5 class="fw-bold mb-0">Staff Login</h5>
    <small class="opacity-75">Visitor Management System</small>
  </div>
  <div class="login-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} rounded-3">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-person me-1"></i>Username</label>
        <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-key me-1"></i>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('index') }}" class="text-muted text-decoration-none small">
        <i class="bi bi-arrow-left me-1"></i>Back to Visitor Sign-In
      </a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
